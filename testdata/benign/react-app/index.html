<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cocoon Test App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 500px;
      width: 100%;
    }
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }
    .badge {
      display: inline-block;
      background: #10b981;
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .card {
      background: #f8fafc;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .card h3 {
      color: #64748b;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }
    .card p {
      color: #334155;
      font-size: 16px;
      line-height: 1.5;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #10b981;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    .btn:hover {
      background: #5568d3;
    }
    .response {
      background: #1e293b;
      color: #10b981;
      padding: 15px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 14px;
      margin-top: 15px;
      display: none;
    }
    .response.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="badge">🐛 Running in Cocoon</span>
    <h1>Cocoon Sandbox Test</h1>
    
    <div class="card">
      <h3>Status</h3>
      <div class="status">
        <span class="status-dot"></span>
        <span>Sandbox Active</span>
      </div>
    </div>
    
    <div class="card">
      <h3>Environment</h3>
      <p>This app is running safely inside a containerized sandbox. Your machine is protected from malicious code.</p>
    </div>
    
    <button class="btn" onclick="testApi()">Test API Call</button>
    <div class="response" id="response"></div>
  </div>

  <script>
    async function testApi() {
      const responseDiv = document.getElementById('response');
      try {
        const res = await fetch('/api/test');
        const data = await res.json();
        responseDiv.textContent = JSON.stringify(data, null, 2);
        responseDiv.classList.add('show');
      } catch (err) {
        responseDiv.textContent = 'Error: ' + err.message;
        responseDiv.style.background = '#7f1d1d';
        responseDiv.classList.add('show');
      }
    }
  </script>
</body>
</html>
